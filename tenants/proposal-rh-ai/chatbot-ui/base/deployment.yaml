kind: Deployment
apiVersion: apps/v1
metadata:
  name: chatbot-ui
  namespace: proposal-rh-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-ui
  template:
    metadata:
      labels:
        app: chatbot-ui
    spec:
      containers:
        - name: chatbot-ui
          serviceAccountName: chatbot-ui
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: ROOT_LOG_LEVEL
              value: 'INFO'
            - name: APP_LOG_LEVEL
              value: 'DEBUG'
            - name: MODEL_ID
              value: 'vllm-inference/redhataillama-31-8b-instruct'
            - name: LLAMA_STACK_BASE_URL
              value: 'http://llama-stack-milvus-remote-service.proposal-rh-ai.svc.cluster.local:8321'
            - name: TEMPERATURE
              value: '0.95'
            - name: TOP_P
              value: '0.95'
            - name: MAX_TOKENS
              value: '4096'
            - name: STREAM
              value: 'True'
            - name: MAX_INFER_ITERS
              value: '10'
            - name: VECTOR_DB_NAME_OCP
              value: 'ocp_rh_vector_db'
            - name: OCP_TOOLGROUP_ID
              value: 'ocp::proposal'
            - name: MCP_SERVER_OCP_URL
              value: 'http://ocp-agent-service.proposal-rh-ai.svc.cluster.local:7860/gradio_api/mcp/sse'
            - name: AGENT_INSTRUCTIONS
              valueFrom:
                configMapKeyRef:
                  name: chatbot-ui-config
                  key: AGENT_INSTRUCTIONS
          ports:
            - containerPort: 7861
              protocol: TCP
          imagePullPolicy: Always
          terminationMessagePolicy: File
          image: 'quay.io/lcoronad/chatbot-proposal-ai:1.1.1'
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
      serviceAccountName: chatbot-ui
      serviceAccount: chatbot-ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
