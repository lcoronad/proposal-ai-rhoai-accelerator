kind: Service
apiVersion: v1
metadata:
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: standard-workbench-kube-rbac-proxy-tls
  name: standard-workbench-kube-rbac-proxy
  labels:
    notebook-name: standard-workbench
spec:
  ipFamilies:
    - IPv4
  ports:
    - name: kube-rbac-proxy
      protocol: TCP
      port: 8443
      targetPort: kube-rbac-proxy
  internalTrafficPolicy: Cluster
  type: ClusterIP
  ipFamilyPolicy: SingleStack
  sessionAffinity: None
  selector:
    statefulset: standard-workbench
