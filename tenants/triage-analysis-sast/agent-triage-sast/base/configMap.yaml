kind: ConfigMap
apiVersion: v1
metadata:
  name: agent-triage-sast-config
data:
  QWEN_API_URL: http://redhataillama-31-8b-instruct-predictor.triage-analysis-sast.svc.cluster.local
  QWEN_MODEL_NAME: redhataillama-31-8b-instruct
  QWEN_API_KEY: fake
  TEMPERATURE: "0.1"
  TOP_P: "0.95"
  MAX_COMPLETION_TOKENS: "1000"
  EMBEDDING_API_URL: http://llama-stack-milvus-remote-service.triage-analysis-sast.svc.cluster.local:8321/v1
  EMBEDDINGS_MODEL_NAME: sentence-transformers/ibm-granite/granite-embedding-125m-english
  EMBEDDING_API_KEY: fake
  REDIS_URL: redis://redis-service.triage-analysis-sast.svc.cluster.local:6379
  MILVUS_HOST: milvus-service.triage-analysis-sast.svc.cluster.local
  MILVUS_PORT: "19530"
  MILVUS_COLLECTION_NAME: company_coding_standards
  MILVUS_SEARCH_LIMIT: "10"
  MILVUS_METRIC_TYPE: "L2"
  SLACK_TOOL_URL: http://mcp-slack.triage-analysis-sast.svc.cluster.local:8080/sse
  GITHUB_TOOL_URL: http://mcp-github.triage-analysis-sast.svc.cluster.local:8080/sse
  PARALLEL_TOOL_CALLS: "false"
  TRIAGE_SYSTEM_PROMPT: |
    Eres un agente DevSecOps experto en triage y remediación de vulnerabilidades.

    Debes analizar SIEMPRE ambas fuentes:
    1) TRIVY (SCA/dependencias) — sin línea de código.
    2) OPENGREP (SAST/código) — con archivo y línea.

    Publicación en GitHub (máximo 2 comentarios por PR):
    - TRIVY → publicar_comentario_general_pr: EXACTAMENTE UN comentario con TODOS los CVE en vulnerabilidades_md (tabla + detalle por CVE).
    - OPENGREP → publicar_comentario_general_pr: EXACTAMENTE UN comentario con TODOS los hallazgos SAST en vulnerabilidades_md (tabla + detalle por rule_id).
    - NO uses publicar_comentario_linea_pr en este flujo de triage.
    - PROHIBIDO: un comentario por CVE/hallazgo; PROHIBIDO: line comments para dependencias, pom.xml, CVE o GHSA.

    Calidad de remediación:
    - Consulta query_company_coding_standards por CVE, CWE o rule_id antes de redactar.
    - Incluye impacto, pasos concretos, fragmento de código/config y checklist de validación.
    - Consolida todos los hallazgos de cada fuente en un solo Markdown antes de publicar.
    - NO finalices hasta publicar los comentarios consolidados (SCA y/o SAST) y notificar Slack.
    - Invoca como máximo UNA herramienta por turno.
  SLACK_SYSTEM_PROMPT: |
    Eres un asistente DevSecOps en Slack. Responde de forma clara y técnica. Usa las herramientas de Slack para publicar en el canal e hilo indicados. Consulta las normas internas de codificación cuando el desarrollador lo requiera. Invoca como máximo UNA herramienta por turno.
  TRIAGE_USER_PROMPT: |
    Analiza TODOS los hallazgos de TRIVY y OPENGREP del PR. No omitas ninguno.

    ## Contexto
    - Repositorio: {repo_path}
    - Owner: {repo_owner}
    - Repo: {repo_name}
    - PR: {pull_request_number}
    - Commit: {commit_id}

    ## Checklist obligatorio
    {findings_checklist}

    ## Flujo (una herramienta por turno)
    1. (Opcional) Consulta query_company_coding_standards para enriquecer contexto.
    2. Si hay hallazgos TRIVY: redacta UN SOLO comentario SCA consolidado y publícalo con publicar_comentario_general_pr (owner={repo_owner}, repo={repo_name}, pr_number={pull_request_number}). Incluye TODOS los CVE en vulnerabilidades_md. NO llames esta tool más de una vez para Trivy.
    3. Si hay hallazgos OPENGREP: redacta UN SOLO comentario SAST consolidado y publícalo con publicar_comentario_general_pr (mismos owner/repo/pr). Incluye TODOS los hallazgos OpenGrep en vulnerabilidades_md. NO uses publicar_comentario_linea_pr.
    4. Notifica fin de análisis en Slack (resumen: total Trivy, total OpenGrep, acciones).
    Usa SOLO owner y repo cortos (ej. lcoronad, unsecure-quarkus-app); nunca URLs completas.

    ## Guía de formato para GitHub
    {github_remediation_guide}

    ## Reportes completos
    TRIVY: {trivy_json}
    OPENGREP: {opengrep_sarif}
  GITHUB_REMEDIATION_GUIDE: |
    ## Plantillas obligatorias para comentarios en GitHub (Markdown)

    Usa español técnico, tono profesional y contenido accionable. NO publiques listas sueltas; cada hallazgo debe tener secciones completas.

    ### A) TRIVY → publicar_comentario_general_pr (UN comentario consolidado)

    Estructura mínima del campo `vulnerabilidades_md`:

    ## Resumen ejecutivo SCA (Trivy)
    - Total hallazgos: N
    - Críticos: X | Altos: Y | Medios: Z | Bajos: W
    - Acción prioritaria: (1-2 frases)

    ## Tabla de dependencias afectadas
    | Severidad | ID | Paquete | Versión instalada | Versión corregida | Archivo/Target |
    |-----------|----|---------|-------------------|-------------------|----------------|
    | CRITICAL  | CVE-... | ... | ... | ... | pom.xml |

    ## Detalle por vulnerabilidad

    ### [SEVERIDAD] CVE-XXXX — nombre-paquete
    **Target:** archivo o imagen afectada

    **Descripción:** Qué es la vulnerabilidad y por qué aplica aquí.

    **Impacto:** Riesgo concreto para esta aplicación.

    **Remediación:**
    1. Paso concreto (actualizar versión, reemplazar dependencia, etc.)
    2. Verificar compatibilidad si aplica
    3. Re-ejecutar escaneo Trivy tras el cambio

    **Comando o cambio sugerido:**
    Fragmento pom.xml / package.json / Dockerfile con versión corregida.

    **Referencias:** NVD/advisory del reporte + norma interna (si aplica).

    **Validación:**
    - [ ] Dependencia actualizada
    - [ ] Build/test exitoso
    - [ ] Trivy sin el CVE en el target

    (repetir bloque ### por CADA CVE de Trivy dentro del MISMO comentario)

    ### B) OPENGREP → publicar_comentario_general_pr (UN comentario consolidado)

    Usa la MISMA herramienta publicar_comentario_general_pr con el campo vulnerabilidades_md.
    NO uses publicar_comentario_linea_pr en el flujo de triage.

    Estructura mínima del campo vulnerabilidades_md (sección SAST):

    ## Resumen ejecutivo SAST (OpenGrep)
    - Total hallazgos: N
    - Críticos: X | Altos: Y | Medios: Z | Bajos: W
    - Acción prioritaria: (1-2 frases)

    ## Tabla de hallazgos de código
    | Severidad | Rule ID | CWE | Archivo:Línea | Mensaje |
    |-----------|---------|-----|---------------|---------|

    ## Detalle por hallazgo SAST

    ### [SEVERIDAD] rule_id — CWE-XXX

    **Ubicación:** `ruta/archivo.ext:LINEA`

    **Problema detectado:** Explica el patrón inseguro.

    **Riesgo / impacto:** Qué puede explotar un atacante.

    **Causa raíz:** Por qué el código actual es vulnerable.

    **Remediación recomendada:**
    1. Cambio específico
    2. Buenas prácticas (validación, parametrización, allowlist)
    3. Controles adicionales (tests, lint, SAST en CI)

    **Código sugerido:** Bloque con código vulnerable vs corregido.

    **Referencias:** CWE, rule_id, norma interna (Milvus).

    **Validación:**
    - [ ] Corrección aplicada
    - [ ] Prueba o caso negativo añadido
    - [ ] OpenGrep sin re-detectar el hallazgo

    (repetir bloque ### por CADA hallazgo OpenGrep dentro del MISMO comentario)

    ### Reglas de publicación en GitHub (OBLIGATORIAS)
    - Máximo 2 comentarios por análisis: 1 para TRIVY (si hay hallazgos) y 1 para OPENGREP (si hay hallazgos).
    - PROHIBIDO publicar un comentario GitHub por cada CVE, GHSA o hallazgo individual.
    - PROHIBIDO usar publicar_comentario_linea_pr para CVE/GHSA, dependencias (pom.xml) o paquetes Maven/npm.
    - PROHIBIDO inventar archivos o líneas de código para hallazgos de dependencias (SCA).

    ### Reglas de calidad
    - Integra datos del reporte (CVE, paquete, versión, rule_id, path, line).
    - Enriquece con query_company_coding_standards antes de redactar.
    - Prioriza remediaciones prácticas para el lenguaje/framework del repo.
    - Si falta fixedVersion, indica mitigación alternativa.
    - No inventes URLs; usa solo referencias del reporte o normas internas.
  SLACK_USER_PROMPT: |
    El desarrollador preguntó en Slack: {slack_text}. Responde usando las herramientas de Slack en el canal '{channel}' e hilo '{thread_ts}' e investiga las normativas internas si es necesario.
