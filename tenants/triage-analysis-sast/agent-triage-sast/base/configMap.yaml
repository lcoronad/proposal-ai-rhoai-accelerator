kind: ConfigMap
apiVersion: v1
metadata:
  name: agent-triage-sast-config
data:
  QWEN_API_URL: http://redhataillama-31-8b-instruct-predictor.triage-analysis-sast.svc.cluster.local
  QWEN_MODEL_NAME: redhataillama-31-8b-instruct
  QWEN_API_KEY: fake
  TEMPERATURE: "0.1"
  TOP_P: "0.95"
  MAX_COMPLETION_TOKENS: "4096"
  EMBEDDING_API_URL: http://llama-stack-milvus-remote-service.triage-analysis-sast.svc.cluster.local:8321/v1
  EMBEDDINGS_MODEL_NAME: sentence-transformers/ibm-granite/granite-embedding-125m-english
  EMBEDDING_API_KEY: fake
  REDIS_URL: redis://redis-service.triage-analysis-sast.svc.cluster.local:6379
  MILVUS_HOST: milvus-service.triage-analysis-sast.svc.cluster.local
  MILVUS_PORT: "19530"
  MILVUS_COLLECTION_NAME: company_coding_standards
  MILVUS_SEARCH_LIMIT: "10"
  MILVUS_METRIC_TYPE: "L2"
  SLACK_TOOL_URL: http://mcp-slack.triage-analysis-sast.svc.cluster.local:8080/sse
  GITHUB_TOOL_URL: http://mcp-github.triage-analysis-sast.svc.cluster.local:8080/sse
  PARALLEL_TOOL_CALLS: "false"
  TRIAGE_SYSTEM_PROMPT: |
    Eres un agente DevSecOps experto en triage de vulnerabilidades. Debes analizar SIEMPRE los dos tipos de hallazgos del PR:
    1) TRIVY (SCA/dependencias): vulnerabilidades en librerías sin línea de código.
    2) OPENGREP (SAST/código): hallazgos con archivo y número de línea.
    Reglas de publicación en GitHub:
    - TRIVY → publicar_comentario_general_pr: un comentario consolidado en el PR.
    - OPENGREP → publicar_comentario_linea_pr: UN comentario por cada hallazgo, anclado a su línea (path, line, commit_id).
    - Usa query_company_coding_standards con CVE/CWE/rule_id para enriquecer remediaciones.
    - NO finalices hasta publicar comentarios para TODOS los hallazgos del checklist.
    - Invoca como máximo UNA herramienta por turno.
  SLACK_SYSTEM_PROMPT: |
    Eres un asistente DevSecOps en Slack. Responde de forma clara y técnica. Usa las herramientas de Slack para publicar en el canal e hilo indicados. Consulta las normas internas de codificación cuando el desarrollador lo requiera. Invoca como máximo UNA herramienta por turno.
  TRIAGE_USER_PROMPT: |
    Analiza TODOS los hallazgos de TRIVY y OPENGREP del PR. No omitas ninguno.

    ## Contexto
    - Repositorio: {repo_path}
    - Owner: {repo_owner}
    - Repo: {repo_name}
    - PR: {pull_request_number}
    - Commit: {commit_id}

    ## Checklist obligatorio
    {findings_checklist}

    ## Flujo (una herramienta por turno)
    1. Consulta query_company_coding_standards por CVE/CWE/rule_id relevantes.
    2. Publica comentario general TRIVY con publicar_comentario_general_pr (owner={repo_owner}, repo={repo_name}, pr_number={pull_request_number}).
    3. Por CADA hallazgo OPENGREP del checklist, publica comentario de línea con publicar_comentario_linea_pr (owner, repo, pr_number, commit_id={commit_id}, path, line, recomendacion).
    4. Notifica fin de análisis en Slack con slack_post_message.

    ## Reportes completos
    TRIVY: {trivy_json}
    OPENGREP: {opengrep_sarif}
  SLACK_USER_PROMPT: |
    El desarrollador preguntó en Slack: {slack_text}. Responde usando las herramientas de Slack en el canal '{channel}' e hilo '{thread_ts}' e investiga las normativas internas si es necesario.
