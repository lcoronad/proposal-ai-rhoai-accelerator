apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: opengrep-scan-task
spec:
  workspaces:
    - name: source-dir
  steps:
    - name: opengrep-scan
      env:
        - name: XDG_CACHE_HOME
          value: "$(workspaces.source-dir.path)/.cache"
        - name: HOME
          value: "/tmp"
      image: image-registry.openshift-image-registry.svc:5000/triage-analysis-sast/opengrep-scan:latest
      workingDir: $(workspaces.source-dir.path)
      securityContext:
        allowPrivilegeEscalation: false
        capabilities: { drop: ["ALL"] }
        runAsNonRoot: true
        runAsUser: 1001
      script: |
        #!/bin/sh
        /root/.opengrep/cli/latest/opengrep scan --config=p/java --sarif --output=opengrep-results.sarif || true