apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: opengrep-scan-task
spec:
  workspaces:
    - name: source-dir
  steps:
    - name: opengrep-scan
      image: opengrep/opengrep:latest
      workingDir: $(workspaces.source-dir.path)
      securityContext:
        allowPrivilegeEscalation: false
        capabilities: { drop: ["ALL"] }
        runAsNonRoot: true
        runAsUser: 1001
      script: |
        #!/bin/sh
        opengrep scan --config=p/java --sarif --output=opengrep-results.sarif || true