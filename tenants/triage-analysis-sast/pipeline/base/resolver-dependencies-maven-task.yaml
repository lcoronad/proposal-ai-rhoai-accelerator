apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: resolver-dependencies-maven-task
spec:
  workspaces:
    - name: source-dir
  steps:
    - name: resolver-dependencies-maven
      image: image-registry.openshift-image-registry.svc:5000/triage-analysis-sast/consume-agent:1.0.1
      workingDir: $(workspaces.source-dir.path)
      securityContext:
        allowPrivilegeEscalation: false
        capabilities: { drop: ["ALL"] }
        runAsNonRoot: true
        runAsUser: 1001
      script: |
        #!/bin/sh
        mvn dependency:go-offline -Dmaven.repo.local=$(workspaces.source-dir.path)/.m2 || true